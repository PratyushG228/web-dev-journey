<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <input type="text" name="" id="stdname">
  <button id="addStd">Add student</button>
  <p id="count"></p>
  <ul id="studentList"></ul>

  <script>
    let addStd = document.getElementById("addStd");
    let stdname = document.getElementById("stdname");
    let count = document.getElementById("count");
    let studentList = document.getElementById("studentList");

    let student = [];

    addStd.addEventListener("click", function(){

      let name = stdname.value.trim();

      if(name === "") return; // for one line this way can be written.
        
      if(isDuplicate(name)){
        return;
      }
  
      student.push(name);

      updateStudentList();

      updateCount();

      stdname.value = "";  

      stdname.focus();

     
    })

     function isDuplicate(name){

        for (let i = 0; i < student.length; i++) {
              if (student[i].toLowerCase() === name.toLowerCase()) {
                  return true;
              }

          }
          return false;
      }

      function updateCount(){
        count.textContent = `Total Students: ${student.length}`; 
      }

      function updateStudentList(){

        studentList.innerHTML = "";

        for(let i=0 ; i<student.length ; i++){  // no need Number(student.length) its already number
        studentList.innerHTML += `<li>${student[i]}</li>`;
        }
      }
      

  </script>
  
</body>
</html>
